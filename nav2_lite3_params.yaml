amcl:
ros__parameters:
use_sim_time: True
base_frame_id: "base_link"   # ✅ FIXED (was base_footprint)
global_frame_id: "map"
odom_frame_id: "odom"
scan_topic: point_cloud      # ⚠️ keep only if converted OR working properly
min_particles: 500
max_particles: 2000
alpha1: 0.2
alpha2: 0.2
alpha3: 0.2
alpha4: 0.2
alpha5: 0.2
transform_tolerance: 1.0

bt_navigator:
ros__parameters:
use_sim_time: True
global_frame: map
robot_base_frame: base_link
odom_topic: "/Odometry"

controller_server:
ros__parameters:
use_sim_time: True
controller_frequency: 20.0

```
min_x_velocity_threshold: 0.001
min_y_velocity_threshold: 0.0   # ✅ FIXED (was 0.5 ❌)
min_theta_velocity_threshold: 0.001

progress_checker_plugin: "progress_checker"
goal_checker_plugins: ["general_goal_checker"]
controller_plugins: ["FollowPath"]

progress_checker:
  plugin: "nav2_controller::SimpleProgressChecker"
  required_movement_radius: 0.1
  movement_time_allowance: 30.0

general_goal_checker:
  plugin: "nav2_controller::SimpleGoalChecker"
  stateful: True
  xy_goal_tolerance: 0.25
  yaw_goal_tolerance: 0.25

FollowPath:
  plugin: "dwb_core::DWBLocalPlanner"

  min_vel_x: 0.0
  max_vel_x: 1.0
  max_vel_theta: 1.0

  min_speed_xy: 0.0     # ✅ FIXED (was 0.5 ❌)
  max_speed_xy: 1.0

  acc_lim_x: 2.5
  acc_lim_theta: 3.2
  decel_lim_x: -2.5
  decel_lim_theta: -3.2

  vx_samples: 20
  vtheta_samples: 20

  sim_time: 1.0

  critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
```

local_costmap:
local_costmap:
ros__parameters:
use_sim_time: True
global_frame: odom
robot_base_frame: base_link

```
  rolling_window: true
  width: 10            # ✅ FIXED (was 8 → too small)
  height: 10
  resolution: 0.05

  robot_radius: 0.3

  plugins: ["obstacle_layer", "inflation_layer"]

  obstacle_layer:
    plugin: "nav2_costmap_2d::ObstacleLayer"
    observation_sources: point_cloud

    point_cloud:
      topic: /point_cloud
      data_type: "PointCloud2"
      sensor_frame: base_link
      marking: True
      clearing: True
      obstacle_max_range: 2.5
      raytrace_max_range: 3.0

  inflation_layer:
    plugin: "nav2_costmap_2d::InflationLayer"
    inflation_radius: 0.55
```

