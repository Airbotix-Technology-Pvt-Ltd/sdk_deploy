/**:
    ros__parameters:
        feature_extract_enable: false
        point_filter_num: 3
        max_iteration: 3
        filter_size_surf: 0.5
        filter_size_map: 0.5
        cube_side_length: 1000.0
        runtime_pos_log_enable: false
        map_file_path: "./simulation.pcd"

        common:
            lid_topic:  "/point_cloud"
            imu_topic:  "/imu/data"
            time_sync_en: false         
            time_offset_lidar_to_imu: 0.0 

        preprocess:
            lidar_type: 2                # 2 for mechanical LiDAR (Hesai/Velodyne)
            scan_line: 32
            scan_rate: 10                
            timestamp_unit: 3            # 3 for nanoseconds (Standard Isaac Sim/Nav2 ROS 2 headers)
            blind: 0.5

        mapping:
            acc_cov: 0.1
            gyr_cov: 0.1
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree:    360.0
            det_range:     100.0
            extrinsic_est_en:  false      
            extrinsic_T: [ 0., 0., 0.]
            extrinsic_R: [ 1., 0., 0., 
                        0., 1., 0., 
                        0., 0., 1.]

        publish:
            path_en:  true
            map_en:   true
            scan_publish_en:  true       
            dense_publish_en: true       
            scan_bodyframe_pub_en: true  
            child_frame_id: "lidar_link"

        pcd_save:
            pcd_save_en: true
            interval: -1
