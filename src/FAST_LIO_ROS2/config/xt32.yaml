/**:
  ros__parameters:

    # -----------------------
    # Core Performance Tuning
    # -----------------------
    feature_extract_enable: false
    point_filter_num: 6          # ↑ reduce points (was 3)
    max_iteration: 3

    filter_size_surf: 1.0        # ↑ downsample surf
    filter_size_map: 1.5         # ↑ downsample map

    cube_side_length: 200.0      # ↓ memory (was 1000)

    runtime_pos_log_enable: false
    map_file_path: "./simulation.pcd"

    # -----------------------
    # Topics
    # -----------------------
    common:
      lid_topic: "/point_cloud"
      imu_topic: "/imu/data"
      time_sync_en: false
      time_offset_lidar_to_imu: 0.0

    # -----------------------
    # Preprocess (Isaac Sim)
    # -----------------------
    preprocess:
      lidar_type: 2
      scan_line: 32
      scan_rate: 10              # ↓ to 5 if still lag
      timestamp_unit: 3
      blind: 0.5

    # -----------------------
    # Mapping (CRITICAL)
    # -----------------------
    mapping:
      acc_cov: 0.1
      gyr_cov: 0.1
      b_acc_cov: 0.0001
      b_gyr_cov: 0.0001

      fov_degree: 360.0
      det_range: 30.0            # ↓ HUGE FIX (was 100)

      extrinsic_est_en: false
      extrinsic_T: [0., 0., 0.]
      extrinsic_R: [1., 0., 0.,
                    0., 1., 0.,
                    0., 0., 1.]

    # -----------------------
    # Publishing (LIGHTWEIGHT)
    # -----------------------
    publish:
      path_en: true
      map_en: true

      scan_publish_en: false         # ↓ disable heavy topics
      dense_publish_en: false        # ↓ major performance gain
      scan_bodyframe_pub_en: false

      child_frame_id: "base_link"

    # -----------------------
    # Map Saving
    # -----------------------
    pcd_save:
      pcd_save_en: true
      interval: -1